<!DOCTYPE html>
<html>
<head>
  <title>HEXADECIMLE</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <h1>HEXADECIMLE</h1>
		
  <div id = "box"><p><span id = "infoGuess">Your Guess: #------</span></p>
    <p><span id = "infoDistance">Distance: ---.---</span></p>
  </div>
  
  <div id = "buttons"><input type = "text" maxlength = "2" id = "R" value = ""></input>
    <input type = "text" maxlength = "2" id = "G" value = ""></input> 
    <input type = "text" maxlength = "2" id = "B" value = ""></input>
  </div>

  <span id = "submitbutton">
    <button onclick = "makeGuess()">
      <span id = "infoNumber">Submit Guess #1</span>
    </button>
  </span>

  <div id = "history">
    <p><span id = "infoPreviousGuess">Previous Guess: #------</span></p>
    <p><span id = "infoPreviousDistance">Previous Distance: ---.---</span></p>
    <p><span id = "infoBestGuess">Best Guess: #------</span></p>
    <p><span id = "infoBestDistance">Best Distance: ---.---</span></p>
  </div>
  
  <span id = "name"><p>A Game by Aiden Morris</p></span>
</body>
</html>
